Curator notes:
  Contamination notes: '"FCX-GX and blobtools were used to detect contaminations but
    could not identify anything. Mitochondrial genome was removed from the assemblies."'
  Other observations: '"PacBio Hifi reads were sub-sampled to 60x read coverage. Hifiasm
    was run in HiC-mode and created two haplotype assemblies (hap1 - contigs: 702,
    yield 762Mb, N50: 17.0Mb; hap2 - contigs: 726, yield 1071Mb, N50: 10.1Mb). The
    phasing is quite in-balanced in terms of yield. But a prior haplotype collapsed
    assembly showed similar stats as the hap2 and were difficult to manually curate.
    (1) MitoHifi - detect mitochondrial contigs (2) Tiara - deep learning to classify
    eukaryotic, bacterial, organelle, archea sequences and (3) BlobtoolKit - detect
    contaminations. Purge_dups was used to remove haplotypic duplications and YaHS
    was used to scaffold the contigs. Manual curations was done in dual-curation mode
    (3 rounds) to fix haplotype misplacements, and misjoins and followed by one curation
    round on each haplotype. I ended up with 26 autosomes + X in hap1 and 26 chromosomes
    in hap2. Though I think that is probably not correct. Many chromosomes have a
    very repetitive block and for some of the smaller chrosomes I could not assign
    a repetitive block. Therfore I might have counted chromosome arms as full chromosomes.
    There are many repetitive contigs (also larger ones in the shrapnels) that show
    low PacBio read coverages. On top there are many structural variations within
    contigs. Long story ... this is the best that I came up with. Happy for any suggestions!
    I could not find any karyotypes images of this species nor any chromosome number.
    Within the genus the chromosome number ranges from 17-30 and the sex system from
    XXY, XY and XO. I could definitely find a single X chromosome that shows nice
    haplotype coverage but I could not find a Y chromosome. I did a synteny analysis
    with 26 "closely" related chromosome scale assemblies but this gave no clue about
    chromosome number or structure either. The mitochondrial sequence was assembled
    with MitoHifi from the raw reads (len=17001bp)."'

