Curator notes:
  Contamination notes: '"56,522,598 bp contained in 348 sequences were considered
    contaminats by FCS-GX and removed from hap1. Additionally, 23,775,017 bp contained
    in 43 sequences were also considered contaminants and removed from hap2. After
    running blobtoolkit, all sequences with higher GC than 0.43 were also considered
    contamintants and removed. In total, 397 and 53 additional sequences adding a
    total of 38.6 and 25.3 Mb were removed from hap1 and hap2, respectively. The longest
    removed contigs for hap1 and hap2 were 6,693,555 and 5,526,655 bp, respectively."'
  Other observations: '"This genome assembly was produced by assembling ONT data with
    Hifiasm and then scaffolding with Yahs. Curation was made in diploid mode and
    we are planning to submit both haplotypes to the ENA. Curation made 34 cuts in
    contigs, 48 breaks at gaps and 113 joins"'

