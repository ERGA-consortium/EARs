Curator notes:
  Interventions/Gb: 107
  Contamination notes: '"The organism was moderately contaminated. Initial screening
    was performed with Tiara and BlobToolKit. Those contaminants were identified in
    the Hi-C contact map and clustered with other contigs showing high contact frequency.
    These blocks, along with other contigs showing minimal contact frequency to the
    primary scaffolds, were removed from the assembly."'
  Other observations: '"The Hifi data was subsampled to 130x, which improved contiguity
    and reduced contamination. The Sanger Hi-C library (ERR10501018) was used for
    scaffolding and manual curation after the SciLifeLab library proved insufficient.
    SciLifeLab data was subsequently remapped for final validation. Because the Sanger
    library used a different individual, signal breaks within contigs were ignored
    to prioritize HiFi data accuracy. The SciLifeLab library was used primarily for
    contamination checks. The pretext file of Sanger Hi-C against the Hifi is also
    in https://export.uppmax.uu.se/snic2021-6-194/ERGA/kaClaLepa1"'

