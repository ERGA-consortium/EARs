Curator notes:
  Interventions/Gb: 36
  Contamination notes: '"Both FCS-GX and Blobtoolkit did not detected contaminants
    in the curated assemblies."'
  Other observations: '"First, Hifiasm assemblies were scaffolded with yahs without
    allowing for contig breaks. Then it was curated using the diploid map to produce
    the curated haplotypes and then reviewed individually with high resolution (HR).
    In total curation and reviews, made 27 cuts in contigs, 137 breaks at gaps and
    206 joins. The links provided point to a shared folder with the High Resolution
    maps (HR), for each hap or both (diploid), allowing multimappings (mq0) or not
    (mq10). The savestate_1 for the diploid map has all supers side by side, showing
    1:1 correpondence between haplotypes. For hap2, SUPER_5 is named SUPER_5_unloc_1
    in the maps, but this little mistake has been fixed in the fasta for the ENA upload.
    Finally, the mitogenome was assembled into a single circular contig 22,497 bp
    long that will be uploaded to ENA together with hap1."'

