Curator notes:
  Interventions/Gb: 9999999
  Contamination notes: '"No contaminations were detected with FCS-GX."'
  Other observations: '"This was a special project. There were 2 PacBio data set -
    both ultra low input. Several attempts to combine the data sets failed. In the
    end we only used PacBio data from individual xoWirArge9 for the hifiasm contig
    assembly. The primary collapsed contigs had following stats: 58004 contigs, 3.04Gb
    yield; n50 189K and a BUSCO of 86.59% with 61.55% duplication rate. Automatic
    purging with purge_dups was suboptimal. We lost Busco genes but duplication rate
    was still above 30%. Therefore we did an iterative purging approach and removed
    junk-, haplotig-, repeat-tagged contigs that don''t have any Busco genes. This
    approach converged after eight rounds at: 3722 contigs, 1.2Gb yield, 519Kb n50
    and a BUSCO of 85.25% with 16.47% duplication rate. The HiC data is based on several
    individuals and of low quality: 78% duplication rate and very few long range interaction:
    437341 read pairs at cis_40kb+. Initial Yahs scaffolding did a very bad job -
    contig error correction was disabled. Therefore we started the manual curation
    from the contigs but in the order and orientation proposed from yahs. In the first
    curation round all contigs were roughly assigned to putative chromosomes without
    splitting any contigs (because the resolution was simply too bad). The second
    curation round is based on smaller chunks, i.e. maps based on 2-3 chromosomes.
    This allowed for better detection of duplicated signals. In this step the contigs
    were trimmed according to the duplication HiC-signal. In order to decide which
    contigs should be marked as haplotig the Busco genes were checked and we tried
    to minimize the BUSCO duplication rate. So far no scaffolding was done. Afterwards
    all curated contigs which are sorted and oriented into putative chromosomes were
    combined and two more curation rounds were done. This time on the full assembly
    and we created scaffolds. This assembly is far from being great. But it would
    be nice to get a another opinion on it :)"'

