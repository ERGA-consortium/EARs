Curator notes:
  Contamination notes: '"FCS-GX identified 6 contigs as bacterial contaminants and
    these were removed from the assembly."'
  Other observations: '"Assembly was performed by the CNAG. We obtained a contig level
    assembly for this assembly because even though the cN50 and sN50 are >20Mbases
    the genome of this species has proven to have long stretches of repetitive sequence
    througout which the HiC illumina is unable to deal with. We first assembled the
    ONT reads with Hifiasm and then ran purge_dups to try and collapse duplicated
    haplotigs and some of repeats."'

