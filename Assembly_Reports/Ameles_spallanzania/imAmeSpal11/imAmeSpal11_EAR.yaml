    with Blobtoolkit"'
  Other observations: '"This genome assembly was produced by assembling PacBio HiFi
    data from two different individuals with Hifiasm, purging with purge_dups and
    then scaffolding with Yahs. Both assemblies are presented as requested. Curation
    made 18 cuts in contigs, 14 breaks at gaps and 80 joins for the Hap1 and 17 cuts
    in contigs, 6 breaks at gaps and 413 joins for the Hap2. The sex chromosomes were
    assigned based on an alignment with the species Deroplatys truncata (GCA_030765065.1)"'

