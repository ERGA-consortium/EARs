Curator notes:
  Contamination notes: '"FCS-GX identified 32 bacterial sequences that were removed
    from the assembly, the total amount of these contaminants added up 3,812,705 bp
    of sequence."'
  Other observations: '"This assembly was obtained with Hifiasm from HiFi data. After
    scaffolding with Yahs the genome was still highly fragmented and duplicated but
    we could make several joins and edits during curation with PretextMap, resulting
    in a substantial increase on scaffold N50 from (~2 Mb to 228Mb) and reducing duplication.
    Curation made 25 cuts in contigs, 49 breaks at gaps and 63 joins. 178 haplotig
    sequences, adding up a total of 121 Mb of sequence, were removed during curaton.
    Before curation, purge_dups had removed 7341 sequences, adding up a total of 1.5
    Gb of sequence and reducing busco dups from 81% to 21% while keeping completeness
    at 97%."'

